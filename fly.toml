# Fly.io configuration for Spring HATEOAS JSON:API Example
#
# Deploy with: fly deploy
# View logs: fly logs
# Open app: fly open

app = "spring-hateoas-jsonapi-example"

[build]
  image = "ghcr.io/toedter/spring-hateoas-jsonapi/example:latest"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

